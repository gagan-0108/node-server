name: Deploy Nodejs code on ExCloud 

on: 
    push: 
        branches: 
            - main

jobs: 
    deploy: 
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code 
              uses: actions/checkout@v4

            - name:  Login to Docker Hub
              uses: docker/login-action@v4
              with: 
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: QEMU
              uses: docker/setup-qemu-action@v4
            
            - name: set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Docker Buid and Push 
              run: |
                docker build -t gagandev0/ironman-node .
                docker push gagandev0/ironman-node

            - name: Deploy on ExCloud
              uses: appleboy/ssh-action@v1.0.3
              with: 
                host: ${{ secrets.SSH_HOST }}
                username: ${{ vars.SSH_USERNAME }}
                key: ${{ secrets.PRIVATE_KEY }}
                script: |
                    sudo docker rm -f ironman-node || true

                    sudo docker pull gagandev0/ironman-node:latest

                    sudo docker run -d --name ironman-node --restart unless-stopped -p 8000:3000 gagandev0/ironman-node:latest

                    sudo docker image prune -f
